# This is a basic workflow to help you get started with Actions

name: dev workflow

# CINTENT >> MANUAL_TRIGGER
# Controls when the action will run.
# on:
#   # Triggers the workflow on push or pull request events but only for the master branch
#   push:
#     branches: [ master, main ]
#   pull_request:
#     branches: [ master, main ]
#   # Allows you to run this workflow manually from the Actions tab
#   workflow_dispatch:
on: [repository_dispatch, workflow_dispatch]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "test"
  test:
    # The type of runner that the job will run on
    strategy:
      matrix:
        # CINTENT >> REMOVE_MATRIX
        # python-versions: ['3.7', '3.8', '3.9', '3.10']
        # os: [ubuntu-18.04, macos-latest, windows-latest]
        python-versions: ['3.10']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-versions }}

      # CINTENT >> INSERT_CINTENT
      - uses: JavidDitty/setup-cintent@3638849e94bdb037f0a405375686a8550e6df904
        with:
          nonblocking: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry tox tox-gh-actions

      - name: test with tox
        run:
          tox

      - name: list files
        run: ls -l .

      # CINTENT >> REMOVE_UPLOAD
      # - uses: codecov/codecov-action@v1
      #   with:
      #     fail_ci_if_error: true
      #     files: coverage.xml

      # CINTENT >> INSERT_CINTENT
      - name: Upload CIntent Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.CINTENT_ARTIFACT_NAME }}
          path: ${{ env.CINTENT_LOGS }}
